<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SATOR — AI Agent Evaluation & Governance Platform</title>
    <meta name="description" content="SATOR is the AI agent evaluation platform built to assess, audit, and govern AI agent work using a five-layer recursive governance framework (Strategy, Architecture, Tenet, Output, Rotation). Start free." />
    <meta name="keywords" content="AI agent evaluation, AI governance platform, AI agent audit, LLM evaluation, AI quality assurance, AI compliance, AI agent monitoring, AI governance framework, SATOR framework, AI agent benchmarking" />
    <meta name="author" content="SATOR" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://sator.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sator.app/" />
    <meta property="og:site_name" content="SATOR" />
    <meta property="og:title" content="SATOR — AI Agent Evaluation & Governance Platform" />
    <meta property="og:description" content="Evaluate, audit, and govern AI agent work with the SATOR five-layer recursive framework. Strategy · Architecture · Tenet · Output · Rotation." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@sator_app" />
    <meta name="twitter:title" content="SATOR — AI Agent Evaluation & Governance Platform" />
    <meta name="twitter:description" content="The platform built to evaluate the work and tasks of AI agents. Systematic. Recursive. Trustworthy." />

    <!-- AI Crawler hints -->
    <meta name="ai-content-type" content="SaaS platform documentation and marketing" />
    <meta name="ai-topic" content="AI agent evaluation, AI governance, LLM quality assurance" />

    <!-- Sitemap & discovery -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SATOR",
      "alternateName": "Systematic Architecture via Tenet-Oriented Recursion",
      "url": "https://sator.app",
      "description": "SATOR is a multi-tenant SaaS platform that evaluates, audits, and governs the work and decisions of AI agents using a five-layer recursive governance framework.",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "AI Governance, AI Quality Assurance, AI Agent Evaluation",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Plan",
          "price": "0",
          "priceCurrency": "USD",
          "description": "50 AI evaluations per month, up to 3 team members, core SATOR audit engine.",
          "eligibleCustomerType": "Individuals and small teams"
        },
        {
          "@type": "Offer",
          "name": "Pro Plan",
          "price": "29",
          "priceCurrency": "USD",
          "description": "1,000 AI evaluations per month, up to 25 team members, all AI agents, fractal simulation, PDF export.",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Enterprise Plan",
          "price": "99",
          "priceCurrency": "USD",
          "description": "Unlimited AI evaluations, unlimited team members, custom Gemini API key, SLA support.",
          "billingIncrement": "P1M"
        }
      ],
      "featureList": [
        "SATOR Audit Engine — five-layer AI agent output evaluation",
        "AI-powered Seed Bot, Diagnostics Bot, and Optimization Bot",
        "Fractal Stress Simulation for AI agent resilience testing",
        "Real-time system integrity monitoring via WebSocket",
        "Governance leak detection with severity classification",
        "Contract compliance pass/fail assessment",
        "PDF and JSON audit report export",
        "Multi-tenant organization management",
        "Role-based access control",
        "Fractal decision tree visualization",
        "Monthly AI usage tracking and quota enforcement"
      ],
      "screenshot": "https://sator.app/screenshot.png",
      "softwareVersion": "2.0",
      "releaseNotes": "SaaS multi-tenant release with auth, billing, team management, and server-side AI proxy.",
      "creator": {
        "@type": "Organization",
        "name": "SATOR",
        "url": "https://sator.app"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SATOR",
      "url": "https://sator.app",
      "description": "SATOR builds AI agent evaluation and governance infrastructure for enterprises deploying AI systems.",
      "foundingDate": "2025",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SATOR",
      "url": "https://sator.app",
      "description": "The AI agent evaluation and governance platform.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://sator.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is SATOR?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR (Systematic Architecture via Tenet-Oriented Recursion) is a SaaS platform for evaluating, auditing, and governing the work of AI agents. It uses a five-layer recursive framework — Strategy, Architecture, Tenet, Output, Rotation — to score any AI agent output and detect governance breaches."
          }
        },
        {
          "@type": "Question",
          "name": "What does the SATOR framework evaluate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The SATOR framework evaluates AI agent work across five dimensions: Strategy (alignment with organizational goals), Architecture (soundness of reasoning structure), Tenet (compliance with defined principles), Output (correctness and usefulness of results), and Rotation (recursive quality over time). Each dimension is scored 0–100."
          }
        },
        {
          "@type": "Question",
          "name": "Who is SATOR built for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR is built for AI engineering teams, enterprise technology departments, AI governance officers, MLOps engineers, and any organization deploying AI agents that need systematic quality assurance, audit trails, and compliance verification."
          }
        },
        {
          "@type": "Question",
          "name": "How does SATOR evaluate AI agent outputs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR uses three specialized AI evaluator agents powered by Google Gemini: Seed Bot (identifies foundational tenets), Diagnostics Bot (surfaces structural weaknesses), and Optimization Bot (generates improvement recommendations). The Audit Engine scores outputs across all five SATOR layers and identifies governance leaks classified by severity."
          }
        },
        {
          "@type": "Question",
          "name": "What is fractal stress simulation in SATOR?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR's Fractal Stress Simulation tests AI agent system resilience through recursive branching failure scenario modeling. It returns a Stability Score (0–100), Fractal Depth, Branching Factor, Collapse Points, strategic Insights, and a Primary Recommendation. Preset scenarios include market collapse, regulatory shock, key-man risk, and competitive disruption."
          }
        },
        {
          "@type": "Question",
          "name": "What AI models power SATOR?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR is powered by Google Gemini (gemini-2.0-flash model) via the @google/genai SDK. Enterprise customers can supply their own Gemini API key for unlimited evaluations billed directly to their account."
          }
        },
        {
          "@type": "Question",
          "name": "How much does SATOR cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SATOR offers three plans: Free ($0/month, 50 AI evaluations, 3 users), Pro ($29/month, 1,000 evaluations, 25 users, all features), and Enterprise ($99/month, unlimited evaluations, unlimited users, custom API key)."
          }
        }
      ]
    }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
